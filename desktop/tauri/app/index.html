<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>chasingclaw Desktop</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #0b1220;
      color: #dbeafe;
    }
    .card {
      width: min(640px, 92vw);
      border: 1px solid #1d4ed8;
      border-radius: 12px;
      background: #111827;
      padding: 20px;
      box-sizing: border-box;
    }
    h1 {
      margin: 0 0 10px;
      font-size: 24px;
    }
    p {
      margin: 6px 0;
      line-height: 1.5;
      color: #bfdbfe;
    }
    .muted {
      color: #93c5fd;
      font-size: 13px;
    }
    code {
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      background: #0f172a;
      border: 1px solid #1e293b;
      border-radius: 6px;
      padding: 2px 6px;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Starting chasingclaw</h1>
    <p id="status">Booting local backend service. Please wait...</p>
    <p class="muted">If startup hangs, close and reopen the app.</p>
  </div>
  <script>
    const statusEl = document.getElementById("status");

    window.addEventListener("backend-start-failed", function () {
      statusEl.textContent = "Backend startup failed. Restart app and check logs.";
    });

    window.addEventListener("backend-exited", function () {
      statusEl.textContent = "Backend exited. Restart the desktop app.";
    });
  </script>
</body>
</html>
