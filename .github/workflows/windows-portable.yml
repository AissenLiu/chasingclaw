name: windows-portable-build

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "chasingclaw/**"
      - "scripts/windows/**"
      - "pyproject.toml"
      - ".github/workflows/windows-portable.yml"

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install project
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Build portable package
        shell: pwsh
        run: |
          ./scripts/windows/build-portable.ps1 -Clean -Zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: chasingclaw-portable-windows
          path: |
            dist/chasingclaw-portable.zip
            dist/chasingclaw-portable/**
          if-no-files-found: error
          retention-days: 14
