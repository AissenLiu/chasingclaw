<!doctype html>
<html lang="zh-CN">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>chasingclaw UI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #ffffff;
      --panel: #ffffff;
      --border: #f0f0f0;
      --text: #1a1a1a;
      --muted: #a0a0a0;
      --sidebar-bg: #f9f9f9;
      --accent: #000000;
      --accent-hover: #333333;
      --accent-light: #f3f3f3;
      --assistant-bg: #f9f9f9;
      --user-bg: #f3f3f3;
      --user-text: #1a1a1a;
      --trace-bg: #fafafa;
      --ok: #059669;
      --err: #dc2626;
      --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.05);
      --shadow-md: 0 4px 15px rgba(0, 0, 0, 0.05);
      --shadow-lg: 0 10px 40px rgba(0, 0, 0, 0.08);
      --radius: 24px;
      --radius-sm: 12px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    .layout {
      height: 100vh;
      display: grid;
      grid-template-columns: 260px 1fr;
    }

    /* ── Sidebar ── */
    .sidebar {
      border-right: 1px solid var(--border);
      background: var(--sidebar-bg);
      display: flex;
      flex-direction: column;
      min-width: 0;
      padding-top: 12px;
    }

    .sidebar-top {
      padding: 20px 16px 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .brand {
      font-size: 17px;
      font-weight: 700;
      letter-spacing: -0.3px;
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--text);
    }

    .brand-icon {
      width: 28px;
      height: 28px;
      background: linear-gradient(135deg, #2563eb 0%, #7c3aed 100%);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .brand-icon svg {
      width: 16px;
      height: 16px;
    }

    .sidebar-nav {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .nav-btn {
      display: flex;
      align-items: center;
      gap: 10px;
      width: 100%;
      border: none;
      background: none;
      color: var(--text);
      border-radius: var(--radius-sm);
      padding: 10px 12px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s ease;
      font-family: inherit;
      text-align: left;
    }

    .nav-btn:hover {
      background: var(--accent-light);
      color: var(--accent);
    }

    .nav-btn.primary-nav {
      background: var(--accent);
      color: #fff;
    }

    .nav-btn.primary-nav:hover {
      background: var(--accent-hover);
    }

    .nav-btn svg {
      width: 18px;
      height: 18px;
      flex-shrink: 0;
      stroke: currentColor;
      fill: none;
      stroke-width: 1.8;
    }

    .sidebar-section-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      padding: 16px 16px 6px;
    }

    .session-list {
      flex: 1;
      overflow-y: auto;
      padding: 4px 10px;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .session-list::-webkit-scrollbar {
      width: 4px;
    }

    .session-list::-webkit-scrollbar-thumb {
      background: #d1d5db;
      border-radius: 4px;
    }

    .session-item {
      position: relative;
      border: none;
      border-radius: var(--radius-sm);
      background: transparent;
      padding: 10px 12px;
      cursor: pointer;
      text-align: left;
      width: 100%;
      transition: all 0.15s ease;
      font-family: inherit;
    }

    .session-item:hover {
      background: #f0f0f0;
    }

    .session-item.active {
      background: var(--text);
    }

    .session-title {
      font-size: 13px;
      font-weight: 500;
      line-height: 1.35;
      color: var(--text);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      padding-right: 20px;
    }

    .session-item.active .session-title {
      color: #ffffff;
    }

    .session-more-btn {
      position: absolute;
      right: 8px;
      top: 50%;
      transform: translateY(-50%);
      background: transparent;
      border: none;
      width: 24px;
      height: 24px;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      opacity: 0;
      transition: all 0.15s ease;
      cursor: pointer;
    }

    .session-item.active .session-more-btn {
      color: #fff;
    }

    .session-more-btn:hover {
      background: rgba(0, 0, 0, 0.05);
    }

    .session-item.active .session-more-btn:hover {
      background: rgba(255, 255, 255, 0.1);
    }

    .session-item:hover .session-more-btn {
      opacity: 1;
    }

    .session-pop-menu {
      position: absolute;
      right: 8px;
      top: 34px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      box-shadow: var(--shadow-md);
      z-index: 100;
      padding: 4px;
      min-width: 80px;
    }

    .session-del-action {
      padding: 8px 12px;
      font-size: 13px;
      color: var(--err);
      cursor: pointer;
      border-radius: 4px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .session-del-action:hover {
      background: #fee2e2;
    }

    .sidebar-footer {
      border-top: 1px solid var(--border);
      padding: 12px 16px;
      font-size: 11px;
      color: var(--muted);
      line-height: 1.5;
    }

    /* ── Main ── */
    .main {
      min-width: 0;
      position: relative;
      background: var(--bg);
    }

    .view {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      min-width: 0;
      min-height: 0;
      background: var(--bg);
    }

    .view.hidden {
      display: none !important;
    }

    .hidden {
      display: none !important;
    }

    /* ── Chat Header ── */
    .chat-header {
      padding: 16px 24px;
      display: flex;
      justify-content: flex-end;
      /* Align actions to the right like Manus */
      align-items: center;
      gap: 12px;
      background: var(--bg);
      z-index: 10;
    }

    .chat-title-group {
      display: none;
      /* Hide the default title to look cleaner */
    }

    .chat-title {
      font-size: 16px;
      font-weight: 500;
      letter-spacing: -0.2px;
    }

    .chat-subtitle {
      margin-top: 4px;
      font-size: 12px;
      color: var(--muted);
    }

    .header-actions {
      display: flex;
      gap: 6px;
    }

    .inline-btn {
      border: 1px solid var(--border);
      background: #fff;
      color: var(--muted);
      border-radius: 8px;
      padding: 7px 12px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s ease;
      font-family: inherit;
    }

    .inline-btn:hover {
      border-color: #d1d5db;
      color: var(--text);
      background: #f9fafb;
    }

    /* ── Chat Scroll & Messages ── */
    .chat-scroll {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
    }

    .chat-scroll::-webkit-scrollbar {
      width: 5px;
    }

    .chat-scroll::-webkit-scrollbar-thumb {
      background: #d1d5db;
      border-radius: 4px;
    }

    .chat-log {
      max-width: 800px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* ── Welcome Screen ── */
    .welcome-screen {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 0 24px;
      text-align: center;
      background: var(--bg);
      margin-top: -60px;
      /* Slight offset for center visually */
    }

    .welcome-screen.hidden {
      display: none !important;
    }

    .welcome-title {
      font-size: 36px;
      font-weight: 500;
      color: var(--text);
      letter-spacing: -0.5px;
      margin-bottom: 24px;
    }

    .welcome-input-wrap {
      width: 100%;
      max-width: 800px;
      position: relative;
      background: #ffffff;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
      transition: all 0.2s ease;
      display: flex;
      flex-direction: column;
      padding: 12px;
    }

    .welcome-input-wrap:focus-within {
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
      border-color: #d1d5db;
    }

    .welcome-input {
      width: 100%;
      border: none;
      padding: 8px 12px;
      font-size: 16px;
      font-family: inherit;
      background: transparent;
      color: var(--text);
      resize: none;
      min-height: 56px;
      max-height: 200px;
      line-height: 1.5;
    }

    .welcome-input:focus {
      outline: none;
    }

    .welcome-input::placeholder {
      color: var(--muted);
      font-weight: 400;
    }

    .welcome-input-actions {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 4px;
      margin-top: 8px;
    }

    .welcome-input-actions-left {
      display: flex;
      gap: 8px;
    }

    .welcome-input-actions-right {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .welcome-action-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 999px;
      padding: 6px 14px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: all 0.15s ease;
    }

    .welcome-action-btn:hover {
      background: #f9fafb;
      border-color: #d1d5db;
    }

    .welcome-action-icon-btn {
      background: transparent;
      border: none;
      color: var(--muted);
      cursor: pointer;
      padding: 8px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s ease;
    }

    .welcome-action-icon-btn:hover {
      background: #f3f4f6;
      color: var(--text);
    }

    .welcome-action-icon-btn svg {
      width: 20px;
      height: 20px;
    }

    .welcome-send-btn {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: var(--text);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s ease;
      color: #fff;
    }

    .welcome-send-btn:hover {
      background: #000;
      transform: scale(1.05);
    }

    .welcome-send-btn svg {
      width: 18px;
      height: 18px;
    }

    .welcome-suggestions {
      margin-top: 32px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }

    .welcome-suggestions-title {
      font-size: 14px;
      color: var(--text);
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .welcome-suggestions-title-actions {
      display: flex;
      gap: 12px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 400;
    }

    .welcome-suggestions-title-actions a {
      color: var(--muted);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .welcome-suggestions-title-actions a:hover {
      color: var(--text);
    }

    .welcome-suggestion-pills {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .suggestion-pill {
      background: #ffffff;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 10px 16px;
      font-size: 14px;
      color: var(--text);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: all 0.15s ease;
      box-shadow: var(--shadow-sm);
    }

    .suggestion-pill:hover {
      border-color: #d1d5db;
      background: #f9fafb;
    }

    .suggestion-pill svg {
      width: 16px;
      height: 16px;
      color: var(--muted);
    }

    /* ── Chat Row & Bubbles ── */
    .chat-row {
      display: flex;
      width: 100%;
    }

    .chat-row.user {
      justify-content: flex-end;
    }

    .chat-row.assistant,
    .chat-row.system {
      justify-content: flex-start;
    }

    .message {
      max-width: min(85%, 720px);
      border-radius: var(--radius);
      padding: 14px 16px;
      background: var(--assistant-bg);
      box-shadow: var(--shadow-sm);
      min-width: 0;
      border: 1px solid var(--border);
      animation: msgIn 0.25s ease;
    }

    @keyframes msgIn {
      from {
        opacity: 0;
        transform: translateY(8px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .message.user {
      background: var(--user-bg);
      color: var(--user-text);
      border: 1px solid var(--border);
    }

    .message.user .content a {
      color: #bfdbfe;
    }

    .message.user .message-meta {
      color: var(--muted);
    }

    .message.system {
      background: #fffbeb;
      border-color: #fde68a;
    }

    .message.pending {
      opacity: 0.6;
      font-style: italic;
    }

    .content {
      line-height: 1.65;
      word-break: break-word;
      font-size: 14px;
    }

    .content h1,
    .content h2,
    .content h3,
    .content h4,
    .content h5,
    .content h6 {
      margin: 14px 0 8px;
      line-height: 1.3;
    }

    .content h1 {
      font-size: 22px;
    }

    .content h2 {
      font-size: 20px;
    }

    .content h3 {
      font-size: 18px;
    }

    .content h4 {
      font-size: 16px;
    }

    .content p {
      margin: 0 0 10px;
    }

    .content p:last-child {
      margin-bottom: 0;
    }

    .content pre {
      margin: 10px 0;
      background: #1e1e2e;
      color: #cdd6f4;
      padding: 12px 14px;
      border-radius: var(--radius-sm);
      overflow-x: auto;
      font-size: 12.5px;
      line-height: 1.5;
    }

    .content code {
      font-family: 'SF Mono', ui-monospace, SFMono-Regular, Menlo, monospace;
      background: #f1f3f5;
      border: 1px solid #e5e7eb;
      border-radius: 6px;
      padding: 1px 5px;
      font-size: 12.5px;
    }

    .message.user .content code {
      background: rgba(255, 255, 255, 0.15);
      border-color: transparent;
      color: #fff;
    }

    .content pre code {
      background: transparent;
      border: 0;
      padding: 0;
      color: inherit;
    }

    .content ul {
      margin: 0 0 10px 18px;
      padding: 0;
    }

    .content li {
      margin: 3px 0;
    }

    .content blockquote {
      margin: 10px 0;
      border-left: 3px solid #d1d5db;
      padding-left: 10px;
      color: #6b7280;
    }

    .content a {
      color: var(--accent);
      text-decoration: none;
    }

    .content a:hover {
      text-decoration: underline;
    }

    .message-meta {
      margin-top: 8px;
      font-size: 11px;
      color: var(--muted);
    }

    .attachment-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 8px;
    }

    .attachment-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border: 1px solid #d1d5db;
      border-radius: 999px;
      padding: 3px 10px;
      font-size: 11px;
      color: #374151;
      background: #fff;
    }

    .message.user .attachment-chip {
      border-color: rgba(255, 255, 255, 0.3);
      color: #fff;
      background: rgba(255, 255, 255, 0.1);
    }

    /* ── Trace ── */
    .trace-wrap {
      margin-top: 10px;
      border: 1px solid #e5e7eb;
      border-radius: var(--radius-sm);
      background: var(--trace-bg);
      overflow: hidden;
    }

    .trace-wrap summary {
      cursor: pointer;
      padding: 8px 12px;
      font-size: 12px;
      color: #6b7280;
      user-select: none;
      list-style: none;
      font-weight: 500;
      transition: background 0.1s;
    }

    .trace-wrap summary:hover {
      background: #f1f3f5;
    }

    .trace-list {
      display: grid;
      gap: 8px;
      padding: 10px;
    }

    .trace-item {
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      background: #fff;
      padding: 8px 10px;
    }

    .trace-head {
      font-size: 12px;
      font-weight: 600;
      color: #111827;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
    }

    .trace-status {
      font-size: 10px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 999px;
      background: #eef2ff;
      color: #4338ca;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }

    .trace-status.ok {
      background: #dcfce7;
      color: var(--ok);
    }

    .trace-status.error {
      background: #fee2e2;
      color: var(--err);
    }

    .trace-detail {
      margin-top: 6px;
      font-size: 12px;
      color: #374151;
      white-space: pre-wrap;
      word-break: break-word;
      background: #f8f9fa;
      border: 1px solid #e5e7eb;
      border-radius: 6px;
      padding: 8px;
      font-family: 'SF Mono', ui-monospace, monospace;
    }

    /* ── Streaming output ── */
    .stream-tool-log {
      display: flex;
      flex-direction: column;
      gap: 4px;
      margin-bottom: 8px;
    }

    .stream-tool-step {
      display: flex;
      align-items: flex-start;
      gap: 6px;
      font-size: 12px;
      padding: 5px 8px;
      border-radius: 6px;
      background: #f3f4f6;
      border: 1px solid #e5e7eb;
      transition: all 0.2s;
    }

    .stream-tool-step--running {
      background: #eff6ff;
      border-color: #bfdbfe;
    }

    .stream-tool-step--running .stream-tool-icon {
      animation: spin 1s linear infinite;
      display: inline-block;
    }

    @keyframes spin {
      from {
        transform: rotate(0deg);
      }

      to {
        transform: rotate(360deg);
      }
    }

    .stream-tool-step--done {
      background: #f0fdf4;
      border-color: #bbf7d0;
    }

    .stream-tool-step--done .stream-tool-icon {
      color: #16a34a;
    }

    .stream-tool-step--error {
      background: #fef2f2;
      border-color: #fecaca;
    }

    .stream-tool-step--error .stream-tool-icon {
      color: #dc2626;
    }

    .stream-tool-icon {
      font-size: 13px;
      flex-shrink: 0;
      line-height: 1.4;
    }

    .stream-tool-label {
      color: #374151;
      font-weight: 500;
    }

    .stream-tool-args {
      margin-top: 3px;
      font-size: 11px;
      color: #6b7280;
      font-family: 'SF Mono', ui-monospace, monospace;
      white-space: pre-wrap;
      word-break: break-all;
      max-height: 60px;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .stream-text {
      white-space: pre-wrap;
      word-break: break-word;
      font-size: 14px;
      line-height: 1.6;
      min-height: 20px;
    }

    .stream-text:empty::before {
      content: '▋';
      animation: blink 1s steps(1) infinite;
    }

    @keyframes blink {
      50% {
        opacity: 0;
      }
    }



    /* ── Composer (in-chat) ── */
    .composer {
      padding: 0 24px 24px;
      background: transparent;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .composer-inner {
      width: 100%;
      max-width: 800px;
      background: #ffffff;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow-md);
      padding: 12px;
      transition: all 0.2s ease;
    }

    .composer-inner:focus-within {
      box-shadow: var(--shadow-lg);
      border-color: #d1d5db;
    }

    .compose-row {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .compose-input {
      width: 100%;
      border: none;
      padding: 4px 8px;
      font-size: 15px;
      font-family: inherit;
      background: transparent;
      color: var(--text);
      resize: none;
      min-height: 48px;
      max-height: 200px;
      line-height: 1.5;
    }

    .compose-input:focus {
      outline: none;
    }

    .compose-input::placeholder {
      color: var(--muted);
      font-weight: 400;
    }

    .compose-actions {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 4px;
    }

    .compose-actions-left {
      display: flex;
      gap: 8px;
    }

    .compose-actions-right {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .composer .btn {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      border: none;
      cursor: pointer;
      transition: all 0.15s;
    }

    .composer .btn.primary {
      background: var(--text);
      color: #fff;
    }

    .composer .btn.primary:hover {
      background: #000;
      transform: scale(1.05);
    }

    .composer .btn.primary svg {
      width: 18px;
      height: 18px;
      color: #fff;
    }

    .composer .file-btn {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      padding: 8px;
      border-radius: 8px;
      transition: all 0.15s;
      display: flex;
      align-items: center;
    }

    .composer .file-btn:hover {
      background: #f3f4f6;
      color: var(--text);
    }

    .composer .file-btn svg {
      width: 20px;
      height: 20px;
    }

    .pending-files {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding: 4px 10px;
    }

    .pending-file {
      border: 1px solid var(--border);
      border-radius: 999px;
      background: #f9fafb;
      font-size: 12px;
      padding: 4px 10px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .pending-file button {
      border: 0;
      background: transparent;
      color: #9ca3af;
      cursor: pointer;
      padding: 0;
      font-size: 14px;
      line-height: 1;
    }

    .pending-file button:hover {
      color: var(--err);
    }

    .status-line {
      font-size: 12px;
      color: var(--muted);
      min-height: 17px;
      padding: 4px 14px;
    }

    .empty-state {
      text-align: center;
      color: var(--muted);
      padding: 40px 10px;
      font-size: 13px;
    }

    /* ── Settings ── */
    .settings-head {
      padding: 14px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(12px);
      gap: 10px;
    }

    .settings-scroll {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      background: var(--bg);
    }

    .settings-scroll::-webkit-scrollbar {
      width: 5px;
    }

    .settings-scroll::-webkit-scrollbar-thumb {
      background: #d1d5db;
      border-radius: 4px;
    }

    .settings-container {
      max-width: 800px;
      margin: 0 auto;
      display: grid;
      gap: 16px;
    }

    .settings-card {
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: #fff;
      padding: 20px;
      box-shadow: var(--shadow-sm);
    }

    .settings-card h3 {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 14px;
      letter-spacing: -0.2px;
    }

    .field {
      margin-bottom: 12px;
    }

    .field:last-child {
      margin-bottom: 0;
    }

    .field label {
      display: block;
      margin-bottom: 6px;
      font-size: 13px;
      font-weight: 500;
      color: #4b5563;
    }

    .field input,
    .field textarea,
    .field select {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 10px 12px;
      font-size: 14px;
      background: #fff;
      color: var(--text);
      font-family: inherit;
      transition: all 0.15s;
    }

    .field input:focus,
    .field textarea:focus,
    .field select:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.08);
    }

    .field textarea {
      min-height: 88px;
      resize: vertical;
      line-height: 1.5;
    }

    .field .hint {
      margin-top: 5px;
      font-size: 11px;
      color: var(--muted);
      line-height: 1.5;
    }

    .grid-2 {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .check-row {
      display: flex;
      gap: 8px;
      align-items: center;
      font-size: 13px;
      color: #374151;
    }

    .check-row input {
      width: auto;
    }

    .settings-actions {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      margin-top: 12px;
    }

    .btn {
      border: 1px solid #d1d5db;
      background: #fff;
      box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
      color: var(--text);
      border-radius: var(--radius-sm);
      padding: 9px 16px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s ease;
      font-family: inherit;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .btn:hover {
      background: #f3f4f6;
      border-color: #9ca3af;
    }

    .btn.primary {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    .btn.primary:hover {
      background: var(--accent-hover);
    }

    /* ── Cron ── */
    .cron-list {
      margin-top: 12px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      overflow: hidden;
    }

    .cron-head,
    .cron-item {
      display: grid;
      grid-template-columns: 0.8fr 1fr 1fr 1.8fr;
      gap: 8px;
      padding: 10px 12px;
      align-items: center;
      font-size: 12px;
    }

    .cron-head {
      background: #f8f9fa;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
      font-weight: 600;
      text-transform: uppercase;
      font-size: 11px;
      letter-spacing: 0.3px;
    }

    .cron-item {
      border-top: 1px solid #f3f4f6;
    }

    .cron-item:first-of-type {
      border-top: none;
    }

    .cron-actions {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .cron-actions button {
      padding: 5px 10px;
      font-size: 12px;
      font-weight: 500;
      border: 1px solid var(--border);
      background: #fff;
      color: var(--text);
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.15s;
      font-family: inherit;
    }

    .cron-actions button:hover {
      background: #f3f4f6;
    }

    .muted {
      color: var(--muted);
    }

    @media (max-width: 1024px) {
      .layout {
        grid-template-columns: 1fr;
      }

      .sidebar {
        display: none;
      }

      .chat-scroll,
      .composer,
      .settings-scroll {
        padding-left: 16px;
        padding-right: 16px;
      }

      .grid-2 {
        grid-template-columns: 1fr;
      }

      .welcome-title {
        font-size: 24px;
      }
    }
  </style>
</head>

<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="sidebar-top">
        <div class="brand">
          <div class="brand-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
              <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z" />
            </svg>
          </div>
          chasingclaw
        </div>
        <div class="sidebar-nav">
          <button id="newSessionBtn" class="nav-btn primary-nav">
            <svg viewBox="0 0 24 24">
              <path d="M12 5v14M5 12h14" stroke-linecap="round" />
            </svg>
            新建任务
          </button>

          <button id="navMemoryBtn" class="nav-btn" style="margin-top: 12px; font-weight: 500;">
            <svg viewBox="0 0 24 24">
              <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
              <polyline points="22,6 12,13 2,6"></polyline>
            </svg>
            记忆管理
          </button>
          <button id="navCronBtn" class="nav-btn" style="font-weight: 500;">
            <svg viewBox="0 0 24 24">
              <circle cx="12" cy="12" r="10"></circle>
              <polyline points="12 6 12 12 16 14"></polyline>
            </svg>
            定时任务
          </button>
          <button id="navSkillsBtn" class="nav-btn" style="font-weight: 500;">
            <svg viewBox="0 0 24 24">
              <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"></path>
            </svg>
            技能管理
          </button>
        </div>
      </div>
      <div class="sidebar-section-label">对话历史</div>
      <div id="sessionList" class="session-list"></div>
      <div class="sidebar-footer">
        <button id="openSettingsBtn" class="nav-btn" style="padding-left:0; padding-right:0; margin-bottom:8px;">
          <svg viewBox="0 0 24 24">
            <path
              d="M12.22 2h-.44a2 2 0 00-2 2v.18a2 2 0 01-1 1.73l-.43.25a2 2 0 01-2 0l-.15-.08a2 2 0 00-2.73.73l-.22.38a2 2 0 00.73 2.73l.15.1a2 2 0 011 1.72v.51a2 2 0 01-1 1.74l-.15.09a2 2 0 00-.73 2.73l.22.38a2 2 0 002.73.73l.15-.08a2 2 0 012 0l.43.25a2 2 0 011 1.73V20a2 2 0 002 2h.44a2 2 0 002-2v-.18a2 2 0 011-1.73l.43-.25a2 2 0 012 0l.15.08a2 2 0 002.73-.73l.22-.39a2 2 0 00-.73-2.73l-.15-.08a2 2 0 01-1-1.74v-.5a2 2 0 011-1.74l.15-.09a2 2 0 00.73-2.73l-.22-.38a2 2 0 00-2.73-.73l-.15.08a2 2 0 01-2 0l-.43-.25a2 2 0 01-1-1.73V4a2 2 0 00-2-2z" />
            <circle cx="12" cy="12" r="3" />
          </svg>
          设置
        </button>
      </div>
    </aside>

    <main class="main">
      <section id="chatView" class="view">
        <div class="chat-header">
          <div class="chat-title-group">
            <p class="chat-title">Chat</p>
            <p class="chat-subtitle" id="chatSubTitle">与模型持续对话，支持 Markdown 和工具调用</p>
          </div>
          <div class="header-actions">
            <button id="clearChatBtn" class="inline-btn">清空</button>
          </div>
        </div>

        <!-- Welcome Screen (shown when no messages) -->
        <div id="welcomeScreen" class="welcome-screen">
          <h1 class="welcome-title">我能为你做什么？</h1>
          <div class="welcome-input-wrap">
            <textarea id="welcomeMessage" class="welcome-input" placeholder="输入消息开始对话..." rows="1"></textarea>

            <div class="welcome-input-actions">
              <div class="welcome-input-actions-left">
                <button id="welcomeFileBtn" class="welcome-action-icon-btn" title="添加附件">
                  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                    stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path
                      d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48" />
                  </svg>
                </button>
              </div>
              <div class="welcome-input-actions-right">
                <button id="welcomeSendBtn" class="welcome-send-btn">
                  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                    stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="12" y1="19" x2="12" y2="5" />
                    <polyline points="5 12 12 5 19 12" />
                  </svg>
                </button>
              </div>
            </div>
          </div>

          <div class="welcome-suggestions">
            <div class="welcome-suggestions-title">
              常用办公场景
            </div>
            <div class="welcome-suggestion-pills">
              <button class="suggestion-pill" onclick="document.getElementById('welcomeMessage').value='帮我总结一份会议纪要';">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                  stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                  <polyline points="14 2 14 8 20 8"></polyline>
                  <line x1="16" y1="13" x2="8" y2="13"></line>
                  <line x1="16" y1="17" x2="8" y2="17"></line>
                  <polyline points="10 9 9 9 8 9"></polyline>
                </svg>
                会议纪要
              </button>
              <button class="suggestion-pill"
                onclick="document.getElementById('welcomeMessage').value='帮我写一封正式的商务合作邮件';">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                  stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
                  <polyline points="22,6 12,13 2,6"></polyline>
                </svg>
                商务邮件
              </button>
              <button class="suggestion-pill" onclick="document.getElementById('welcomeMessage').value='帮我润色一下这份工作周报';">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                  stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
                  <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
                </svg>
                周报润色
              </button>
              <button class="suggestion-pill" onclick="document.getElementById('welcomeMessage').value='提取附件文档里的核心数据';">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                  stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <ellipse cx="12" cy="5" rx="9" ry="3"></ellipse>
                  <path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"></path>
                  <path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"></path>
                </svg>
                数据提取
              </button>
              <button class="suggestion-pill"
                onclick="document.getElementById('welcomeMessage').value='帮我生成一份项目计划书的框架';">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                  stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                  <line x1="16" y1="2" x2="16" y2="6"></line>
                  <line x1="8" y1="2" x2="8" y2="6"></line>
                  <line x1="3" y1="10" x2="21" y2="10"></line>
                  <path d="M8 14h.01"></path>
                  <path d="M12 14h.01"></path>
                  <path d="M16 14h.01"></path>
                  <path d="M8 18h.01"></path>
                  <path d="M12 18h.01"></path>
                  <path d="M16 18h.01"></path>
                </svg>
                项目计划
              </button>
              <button class="suggestion-pill" onclick="document.getElementById('welcomeMessage').value='翻译并总结这份技术文档';">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                  stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M5 8l6 6"></path>
                  <path d="M4 14l6-6 2-3"></path>
                  <path d="M2 5h12"></path>
                  <path d="M7 2h1"></path>
                  <path d="M22 22l-5-10-5 10"></path>
                  <path d="M14 18h6"></path>
                </svg>
                文档翻译
              </button>
            </div>
          </div>
        </div>

        <div id="chatScrollWrap" class="chat-scroll hidden">
          <div id="chatLog" class="chat-log"></div>
        </div>

        <div id="composerWrap" class="composer hidden">
          <div class="composer-inner">
            <input id="filePicker" type="file" multiple style="display:none;" />
            <div id="pendingFiles" class="pending-files"></div>
            <div class="compose-row">
              <textarea id="message" class="compose-input" placeholder="输入消息开始对话..."></textarea>
              <div class="compose-actions">
                <div class="compose-actions-left">
                  <button id="fileBtn" class="welcome-action-icon-btn" type="button" title="添加附件">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                      stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                      <path
                        d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48" />
                    </svg>
                  </button>
                </div>
                <div class="compose-actions-right">
                  <button id="sendBtn" class="btn primary" type="button">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                      stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                      <line x1="12" y1="19" x2="12" y2="5" />
                      <polyline points="5 12 12 5 19 12" />
                    </svg>
                  </button>
                </div>
              </div>
            </div>
          </div>
          <div id="chatStatus" class="status-line"></div>
        </div>
      </section>

      <section id="settingsView" class="view hidden">
        <div class="settings-head">
          <div>
            <p class="chat-title" style="margin:0;">设置</p>
            <p class="chat-subtitle" style="margin-top:3px;">模型、Webhook、工具和 Cron 统一配置页面</p>
          </div>
          <button class="btn backToChatBtn">返回对话</button>
        </div>

        <div class="settings-scroll">
          <div class="settings-container">
            <div class="settings-card">
              <h3>模型配置</h3>
              <div class="grid-2">
                <div class="field">
                  <label>Provider</label>
                  <select id="provider"></select>
                </div>
                <div class="field">
                  <label>Model</label>
                  <input id="model" placeholder="如 qwen3-coder-30b-a3b-instruct" />
                </div>
              </div>
              <div class="grid-2">
                <div class="field">
                  <label>API Base URL</label>
                  <input id="apiBase" placeholder="例如 http://localhost:8000/v1" />
                </div>
                <div class="field">
                  <label>API Key</label>
                  <input id="apiKey" type="password" placeholder="输入后点击保存" />
                </div>
              </div>
            </div>

            <div class="settings-card">
              <h3>智慧财信 Webhook</h3>
              <div class="field">
                <label>智慧财信机器人 webhook 地址</label>
                <input id="webhookCallbackUrl" placeholder="例如 https://your-im-server/webhook" />
              </div>
              <div class="field">
                <label>用于配置智慧财信机器人的 webhook 回调地址</label>
                <input id="inboundWebhookUrl" readonly />
              </div>

              <div class="grid-2">
                <div class="field">
                  <label>Webhook Timeout (秒)</label>
                  <input id="webhookTimeoutSeconds" type="number" min="1" step="1" />
                </div>
                <div class="field">
                  <label>回复消息类型</label>
                  <select id="webhookMessageType">
                    <option value="text">text</option>
                    <option value="markdown">markdown</option>
                    <option value="link">link</option>
                  </select>
                </div>
              </div>

              <div class="field">
                <label>消息模板（支持 {reply} 占位符）</label>
                <textarea id="webhookMessageTemplate" placeholder="默认: {reply}"></textarea>
              </div>

              <div class="grid-2">
                <div class="field">
                  <label>link.title</label>
                  <input id="webhookLinkTitle" placeholder="chasingclaw 回复" />
                </div>
                <div class="field">
                  <label>link.btnTitle</label>
                  <input id="webhookLinkButtonTitle" placeholder="查看详情" />
                </div>
              </div>

              <div class="field">
                <label>link.messageUrl（可选）</label>
                <input id="webhookLinkMessageUrl" placeholder="例如 https://your-site/details" />
              </div>

              <div class="grid-2">
                <div class="field">
                  <label>签名 key</label>
                  <input id="webhookSignKey" placeholder="Authorization 的 key" />
                </div>
                <div class="field">
                  <label>签名 secret</label>
                  <input id="webhookSignSecret" type="password" placeholder="Authorization 签名 secret" />
                </div>
              </div>

              <div class="settings-actions">
                <div class="status-line" id="webhookStatus"></div>
                <button id="webhookTestBtn" class="btn" type="button">测试智慧财信发送</button>
              </div>
            </div>

            <div class="settings-card">
              <h3>运行配置</h3>
              <div class="field">
                <div class="check-row">
                  <input id="restrictToWorkspace" type="checkbox" />
                  <label for="restrictToWorkspace" style="margin:0;">Restrict tools to workspace</label>
                </div>
              </div>
            </div>

            <div class="settings-actions" style="margin-top: 24px; justify-content: flex-end; gap: 16px;">
              <div id="cfgStatus" class="status-line"></div>
              <button id="saveBtn" class="btn primary" type="button">保存配置</button>
            </div>
          </div>
        </div>
      </section>

      <section id="memoryView" class="view hidden">
        <div class="settings-head">
          <div>
            <p class="chat-title" style="margin:0;">记忆管理</p>

  <script>
    const KEY = 'chasingclaw_webui_session_id';
    const DEFAULT_PROVIDER_OPTIONS = ['openrouter', 'openai', 'anthropic', 'deepseek', 'custom', 'intranet'];
    const MAX_INLINE_FILE_BYTES = 200 * 1024;
    const MAX_INLINE_TEXT_CHARS = 12000;
    const MAX_ATTACHMENTS = 6;

    let sessionId = localStorage.getItem(KEY) || createSessionId();
    let webhookEventCursor = 0;
    let webhookPollTimer = null;
    let pendingFiles = [];
    let sessionsCache = [];

    const el = (id) => document.getElementById(id);
    const chatLog = el('chatLog');

    function toggleChatMode(hasMessages) {
      const welcome = el('welcomeScreen');
      const scroll = el('chatScrollWrap');
      const composer = el('composerWrap');
      if (hasMessages) {
        welcome.classList.add('hidden');
        scroll.classList.remove('hidden');
        composer.classList.remove('hidden');
      } else {
        welcome.classList.remove('hidden');
        scroll.classList.add('hidden');
        composer.classList.add('hidden');
      }
    }

    function createSessionId() {
      if (window.crypto && typeof window.crypto.randomUUID === 'function') {
        return window.crypto.randomUUID();
      }
      return 'sid-' + Date.now().toString(36) + '-' + Math.random().toString(36).slice(2, 10);
    }

    function nowIso() {
      return new Date().toISOString();
    }

    function formatMessageTime(value) {
      if (!value) return new Date().toLocaleTimeString();
      const d = new Date(value);
      if (Number.isNaN(d.getTime())) return new Date().toLocaleTimeString();
      return d.toLocaleTimeString();
    }

    function formatDateTime(value) {
      if (!value) return '';
      const d = new Date(value);
      if (Number.isNaN(d.getTime())) return '';
      return d.toLocaleString();
    }

    function escapeHtml(text) {
      return String(text || '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    function inlineMarkdown(text) {
      let html = escapeHtml(text);
      html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
      html = html.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
      html = html.replace(/\*([^*]+)\*/g, '<em>$1</em>');
      html = html.replace(/\[([^\]]+)\]\((https?:\/\/[^\s)]+)\)/g, '<a href="$2" target="_blank" rel="noopener noreferrer">$1</a>');
      html = html.replace(/(^|\s)(https?:\/\/[^\s<]+)/g, '$1<a href="$2" target="_blank" rel="noopener noreferrer">$2</a>');
      return html;
    }

    function markdownToHtml(markdownText) {
      const src = String(markdownText || '').replace(/\r\n/g, '\n');
      const lines = src.split('\n');
      const html = [];
      let paragraph = [];
      let inList = false;

      const flushParagraph = () => {
        if (!paragraph.length) return;
        html.push('<p>' + paragraph.join('<br />') + '</p>');
        paragraph = [];
      };

      const closeList = () => {
        if (!inList) return;
        html.push('</ul>');
        inList = false;
      };

      for (let i = 0; i < lines.length; i += 1) {
        const line = lines[i];

        if (line.startsWith('```')) {
          flushParagraph();
          closeList();
          const block = [];
          let j = i + 1;
          while (j < lines.length && !lines[j].startsWith('```')) {
            block.push(lines[j]);
            j += 1;
          }
          html.push('<pre><code>' + escapeHtml(block.join('\n')) + '</code></pre>');
          i = j;
          continue;
        }

        if (!line.trim()) {
          flushParagraph();
          closeList();
          continue;
        }

        const heading = line.match(/^(#{1,6})\s+(.*)$/);
        if (heading) {
          flushParagraph();
          closeList();
          const level = heading[1].length;
          html.push('<h' + level + '>' + inlineMarkdown(heading[2]) + '</h' + level + '>');
          continue;
        }

        const quote = line.match(/^>\s?(.*)$/);
        if (quote) {
          flushParagraph();
          closeList();
          html.push('<blockquote>' + inlineMarkdown(quote[1]) + '</blockquote>');
          continue;
        }

        const listItem = line.match(/^[-*]\s+(.*)$/);
        if (listItem) {
          flushParagraph();
          if (!inList) {
            html.push('<ul>');
            inList = true;
          }
          html.push('<li>' + inlineMarkdown(listItem[1]) + '</li>');
          continue;
        }

        paragraph.push(inlineMarkdown(line));
      }

      flushParagraph();
      closeList();
      return html.join('');
    }

    function providerLabel(name) {
      if (name === 'intranet') {
        return 'intranet (OpenAI-compatible)';
      }
      return name;
    }

    async function api(path, options = {}) {
      const opts = { ...options };
      opts.headers = { 'Content-Type': 'application/json', ...(options.headers || {}) };
      const res = await fetch(path, opts);
      const data = await res.json().catch(() => ({}));
      if (!res.ok) {
        let message = data.error || ('HTTP ' + res.status);
        if (data.detail) {
          try {
            message += '\n' + JSON.stringify(data.detail, null, 2);
          } catch (_) {
            message += '\n' + String(data.detail);
          }
        }
        throw new Error(message);
      }
      return data;
    }

    const VIEWS = ['chatView', 'settingsView', 'memoryView', 'cronView', 'skillsView'];
    function switchView(viewId) {
      VIEWS.forEach(id => {
        const elNode = el(id);
        if (elNode) elNode.classList.toggle('hidden', id !== viewId);
      });
      document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
    }

    function showChatView() {
      switchView('chatView');
      el('newSessionBtn').classList.add('active');
    }

    function showSettingsView() {
      switchView('settingsView');
      el('openSettingsBtn').classList.add('active');
    }

    function showMemoryView() {
      switchView('memoryView');
      el('navMemoryBtn').classList.add('active');
      loadMemoryFiles();
    }

    function showCronView() {
      switchView('cronView');
      el('navCronBtn').classList.add('active');
    }

    function showSkillsView() {
      switchView('skillsView');
      el('navSkillsBtn').classList.add('active');
      loadSkillsFiles();
    }

    function isApiBaseProvider() {
      const p = el('provider').value;
      return p === 'custom' || p === 'intranet';
    }

    function updateApiBaseState() {
      const input = el('apiBase');
      const enabled = isApiBaseProvider();
      input.disabled = !enabled;
      if (!enabled) {
        input.value = '';
        input.placeholder = '仅 custom / intranet 可填写';
      } else {
        input.placeholder = '例如 http://localhost:8000/v1';
      }
    }

    function updateWebhookMessageTypeState() {
      const isLink = el('webhookMessageType').value === 'link';
      el('webhookLinkTitle').disabled = !isLink;
      el('webhookLinkMessageUrl').disabled = !isLink;
      el('webhookLinkButtonTitle').disabled = !isLink;
    }

    function updateCronScheduleInputs() {
      const scheduleType = el('cronScheduleType').value;
      el('cronEverySeconds').disabled = scheduleType !== 'every';
      el('cronExpr').disabled = scheduleType !== 'cron';
      el('cronAt').disabled = scheduleType !== 'at';
    }

    function setProviderOptions(options, selected) {
      const provider = el('provider');
      provider.innerHTML = '';
      for (const p of options) {
        const option = document.createElement('option');
        option.value = p;
        option.textContent = providerLabel(p);
        provider.appendChild(option);
      }

      const providerValue = selected || options[0] || 'openrouter';
      if (![...provider.options].some((o) => o.value === providerValue) && providerValue) {
        const option = document.createElement('option');
        option.value = providerValue;
        option.textContent = providerValue;
        provider.appendChild(option);
      }

      provider.value = providerValue;
      updateApiBaseState();
    }

    function setSessionInfo() {
      localStorage.setItem(KEY, sessionId);
    }

    function renderAttachmentChips(container, attachments) {
      if (!attachments || !attachments.length) return;
      const row = document.createElement('div');
      row.className = 'attachment-row';
      for (const item of attachments) {
        const chip = document.createElement('span');
        chip.className = 'attachment-chip';
        const size = item && typeof item.size === 'number' ? ' (' + formatFileSize(item.size) + ')' : '';
        chip.textContent = (item && item.name ? item.name : 'attachment') + size;
        row.appendChild(chip);
      }
      container.appendChild(row);
    }

    function normalizeTraceStatus(event) {
      if (!event || typeof event !== 'object') return '';
      const status = String(event.status || '').toLowerCase();
      if (status === 'ok' || status === 'success' || status === 'done') return 'ok';
      if (status === 'error' || status === 'failed') return 'error';
      if (String(event.type || '').includes('error')) return 'error';
      return '';
    }

    function renderTracePanel(trace) {
      const list = Array.isArray(trace) ? trace : [];
      if (!list.length) return null;

      const details = document.createElement('details');
      details.className = 'trace-wrap';

      const summary = document.createElement('summary');
      summary.textContent = '工具调用过程 (' + list.length + ')';
      details.appendChild(summary);

      const traceList = document.createElement('div');
      traceList.className = 'trace-list';

      for (const event of list) {
        const item = document.createElement('div');
        item.className = 'trace-item';

        const head = document.createElement('div');
        head.className = 'trace-head';

        const title = document.createElement('span');
        title.textContent = event.summary || event.tool || event.type || 'event';
        head.appendChild(title);

        const status = document.createElement('span');
        const statusKind = normalizeTraceStatus(event);
        status.className = 'trace-status' + (statusKind ? ' ' + statusKind : '');
        status.textContent = statusKind || 'info';
        head.appendChild(status);

        item.appendChild(head);

        const detailParts = [];
        if (event.arguments) {
          detailParts.push('args:\n' + event.arguments);
        }
        if (event.result) {
          detailParts.push('result:\n' + event.result);
        }
        if (event.timestamp) {
          detailParts.push('time: ' + formatDateTime(event.timestamp));
        }

        if (detailParts.length) {
          const detail = document.createElement('div');
          detail.className = 'trace-detail';
          detail.textContent = detailParts.join('\n\n');
          item.appendChild(detail);
        }

        traceList.appendChild(item);
      }

      details.appendChild(traceList);
      return details;
    }

    function appendMessage(role, text, options = {}) {
      toggleChatMode(true);
      const roleClass = role === 'user' ? 'user' : role === 'assistant' ? 'assistant' : 'system';

      const row = document.createElement('div');
      row.className = 'chat-row ' + roleClass;

      const bubble = document.createElement('div');
      bubble.className = 'message ' + roleClass;
      if (options.pending) {
        bubble.classList.add('pending');
      }

      const content = document.createElement('div');
      content.className = 'content';
      if (options.markdown) {
        content.innerHTML = markdownToHtml(text || '');
      } else {
        content.textContent = text || '';
      }
      bubble.appendChild(content);

      if (Array.isArray(options.attachments) && options.attachments.length) {
        renderAttachmentChips(bubble, options.attachments);
      }

      const tracePanel = renderTracePanel(options.trace || []);
      if (tracePanel) {
        bubble.appendChild(tracePanel);
      }

      const meta = document.createElement('div');
      meta.className = 'message-meta';
      meta.textContent = formatMessageTime(options.timestamp);
      bubble.appendChild(meta);

      row.appendChild(bubble);
      chatLog.appendChild(row);
      chatLog.scrollTop = chatLog.scrollHeight;
      return row;
    }

    function formatWebhookEvent(event) {
      if (!event) {
        return '[Webhook] 收到空事件';
      }
      let text = '[Webhook] ' + (event.summary || event.event || '收到事件');
      if (event.detail) {
        try {
          text += '\n' + JSON.stringify(event.detail, null, 2);
        } catch (err) {
          text += '\n(detail parse failed)';
        }
      }
      return text;
    }

    async function loadWebhookEvents(options = {}) {
      const reset = !!options.reset;
      const since = reset ? 0 : webhookEventCursor;
      const limit = reset ? 30 : 80;
      const data = await api('/api/webhook/events?since=' + encodeURIComponent(String(since)) + '&limit=' + encodeURIComponent(String(limit)));

      for (const event of data.events || []) {
        appendMessage('system', formatWebhookEvent(event), { timestamp: event.timestamp });
        const eventId = Number(event.id || 0);
        if (eventId > webhookEventCursor) {
          webhookEventCursor = eventId;
        }
      }

      const lastId = Number(data.lastId || 0);
      if (lastId > webhookEventCursor) {
        webhookEventCursor = lastId;
      }
    }

    function startWebhookEventPolling() {
      if (webhookPollTimer) {
        clearInterval(webhookPollTimer);
      }

      webhookPollTimer = window.setInterval(async () => {
        try {
          await loadWebhookEvents();
        } catch (_) {
          // Keep silent for temporary polling errors.
        }
      }, 2500);
    }

    function formatFileSize(bytes) {
      const size = Number(bytes || 0);
      if (!size) return '0B';
      if (size < 1024) return size + 'B';
      if (size < 1024 * 1024) return (size / 1024).toFixed(1) + 'KB';
      return (size / (1024 * 1024)).toFixed(1) + 'MB';
    }

    function isTextLikeFile(file) {
      const type = String(file.type || '').toLowerCase();
      if (type.startsWith('text/')) return true;
      if (type.includes('json') || type.includes('xml') || type.includes('javascript') || type.includes('yaml')) return true;
      const name = String(file.name || '').toLowerCase();
      return /\.(txt|md|markdown|json|yaml|yml|xml|csv|log|ini|cfg|toml|py|js|ts|tsx|java|go|rs|sh|sql|html|css)$/i.test(name);
    }

    function renderPendingFiles() {
      const container = el('pendingFiles');
      container.innerHTML = '';

      if (!pendingFiles.length) {
        return;
      }

      for (let i = 0; i < pendingFiles.length; i += 1) {
        const file = pendingFiles[i];
        const chip = document.createElement('span');
        chip.className = 'pending-file';

        const text = document.createElement('span');
        text.textContent = file.name + ' (' + formatFileSize(file.size) + ')';
        chip.appendChild(text);

        const remove = document.createElement('button');
        remove.type = 'button';
        remove.textContent = '×';
        remove.title = '移除';
        remove.addEventListener('click', () => {
          pendingFiles = pendingFiles.filter((_, idx) => idx !== i);
          renderPendingFiles();
        });
        chip.appendChild(remove);

        container.appendChild(chip);
      }
    }

    async function buildAttachmentPayload(files) {
      const picked = files.slice(0, MAX_ATTACHMENTS);
      const payload = [];

      for (const file of picked) {
        const item = {
          name: file.name,
          size: file.size,
          type: file.type || '',
          inlined: false,
          note: '',
          content: '',
        };

        const textLike = isTextLikeFile(file);
        if (!textLike) {
          item.note = 'binary file, not inlined';
          payload.push(item);
          continue;
        }

        if (file.size > MAX_INLINE_FILE_BYTES) {
          item.note = 'file too large, not inlined';
          payload.push(item);
          continue;
        }

        try {
          let content = await file.text();
          if (content.length > MAX_INLINE_TEXT_CHARS) {
            content = content.slice(0, MAX_INLINE_TEXT_CHARS) + '\n...(truncated)';
            item.note = 'content truncated';
          }
          item.inlined = true;
          item.content = content;
        } catch (err) {
          item.note = 'failed to read file content';
        }

        payload.push(item);
      }

      return payload;
    }

    function buildMessageWithAttachments(message, attachmentPayload) {
      const cleanMessage = String(message || '').trim();
      const attachments = Array.isArray(attachmentPayload) ? attachmentPayload : [];

      const displayParts = [];
      if (cleanMessage) displayParts.push(cleanMessage);
      if (attachments.length) {
        displayParts.push('[附件] ' + attachments.map((a) => a.name).join(', '));
      }

      const llmParts = [];
      if (cleanMessage) llmParts.push(cleanMessage);

      for (const item of attachments) {
        if (item.inlined && item.content) {
          llmParts.push('[附件 ' + item.name + ']\n\n```\n' + item.content + '\n```');
        } else {
          const note = item.note ? ' - ' + item.note : '';
          llmParts.push('[附件 ' + item.name + '] (size=' + formatFileSize(item.size) + note + ')');
        }
      }

      return {
        displayMessage: displayParts.join('\n').trim(),
        llmMessage: llmParts.join('\n\n').trim(),
        attachments: attachments.map((a) => ({
          name: a.name,
          size: a.size,
          type: a.type,
          note: a.note,
          inlined: !!a.inlined,
        })),
      };
    }

    async function loadConfig() {
      const data = await api('/api/config');
      const options = (data.providerOptions && data.providerOptions.length)
        ? data.providerOptions
        : DEFAULT_PROVIDER_OPTIONS;
      setProviderOptions(options, data.provider || options[0] || 'openrouter');

      el('model').value = data.model || '';
      if (isApiBaseProvider()) {
        el('apiBase').value = data.apiBase || '';
      }
      el('apiKey').value = data.apiKey || '';
      el('restrictToWorkspace').checked = !!data.restrictToWorkspace;

      el('webhookCallbackUrl').value = data.webhookCallbackUrl || '';
      el('inboundWebhookUrl').value = data.inboundWebhookUrl || (window.location.origin + '/api/webhook/request');

        provider: el('provider').value,
        model: el('model').value,
        apiKey: el('apiKey').value,
        apiBase: isApiBaseProvider() ? el('apiBase').value : '',
        restrictToWorkspace: el('restrictToWorkspace').checked,
        webhookCallbackUrl: el('webhookCallbackUrl').value,
        webhookTimeoutSeconds: Number(el('webhookTimeoutSeconds').value || 15),
        webhookSignKey: el('webhookSignKey').value,
        webhookSignSecret: el('webhookSignSecret').value,
        webhookMessageType: el('webhookMessageType').value,
        webhookMessageTemplate: el('webhookMessageTemplate').value,
        webhookLinkTitle: el('webhookLinkTitle').value,
        webhookLinkMessageUrl: el('webhookLinkMessageUrl').value,
        webhookLinkButtonTitle: el('webhookLinkButtonTitle').value,

    function renderSessions(items) {
      const container = el('sessionList');
      container.innerHTML = '';

      const sessions = Array.isArray(items) ? items : [];
      if (!sessions.length) {
        const empty = document.createElement('div');
        empty.className = 'empty-state';
        empty.textContent = '暂无对话记录';
        container.appendChild(empty);
        return;
      }

      for (const session of sessions) {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'session-item' + (session.sessionId === sessionId ? ' active' : '');

        const title = document.createElement('p');
        title.className = 'session-title';
        title.textContent = session.title || ('会话 ' + String(session.sessionId || '').slice(0, 8));
        btn.appendChild(title);

        btn.addEventListener('click', async () => {
          if (!session.sessionId || session.sessionId === sessionId) return;
          sessionId = String(session.sessionId);
          setSessionInfo();
          await loadHistory();
          renderSessions(sessionsCache);
          showChatView();
        });

        const moreBtn = document.createElement('button');
        moreBtn.className = 'session-more-btn';
        moreBtn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><circle cx="12" cy="12" r="1.5"></circle><circle cx="19" cy="12" r="1.5"></circle><circle cx="5" cy="12" r="1.5"></circle></svg>';

        const popMenu = document.createElement('div');
        popMenu.className = 'session-pop-menu hidden';
        popMenu.innerHTML = '<div class="session-del-action"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg> 删除</div>';

        moreBtn.addEventListener('click', (e) => {
          e.stopPropagation();
          document.querySelectorAll('.session-pop-menu:not(.hidden)').forEach(m => {
            if (m !== popMenu) m.classList.add('hidden');
          });
          popMenu.classList.toggle('hidden');
        });

        popMenu.querySelector('.session-del-action').addEventListener('click', async (e) => {
          e.stopPropagation();
          popMenu.classList.add('hidden');
          try {
            await api('/api/sessions/remove', {
              method: 'POST',
              body: JSON.stringify({ sessionId: session.sessionId }),
            });
            if (session.sessionId === sessionId) {
              el('newSessionBtn').click();
            } else {
              await loadSessions();
            }
          } catch (err) {
            console.error('Failed to delete session', err);
            alert('删除会话失败：' + err.message);
          }
        });

        btn.appendChild(moreBtn);
        btn.appendChild(popMenu);

        container.appendChild(btn);
      }
    }

    async function loadSessions() {
      const data = await api('/api/sessions?channel=webui&limit=200');
      const sessions = Array.isArray(data.sessions) ? data.sessions : [];

      const known = sessions.some((s) => s.sessionId === sessionId);
      if (!known && sessionId) {
        sessions.unshift({
          sessionId,
          title: '当前会话',
          preview: '',
          updatedAt: nowIso(),
          messageCount: 0,
        });
      }

      sessionsCache = sessions;
      renderSessions(sessions);
    }

    async function loadHistory() {
      chatLog.innerHTML = '';
      const data = await api('/api/history?sessionId=' + encodeURIComponent(sessionId));
      const messages = data.messages || [];

      if (!messages.length) {
        toggleChatMode(false);
      }

      for (const item of messages) {
        if (item.role === 'user' || item.role === 'assistant' || item.role === 'system') {
          appendMessage(
            item.role,
            item.content || '',
            {
              timestamp: item.timestamp,
              markdown: item.role === 'assistant',
              trace: item.trace || [],
              attachments: item.attachments || [],
            }
          );
        }
      }

      webhookEventCursor = 0;
      await loadWebhookEvents({ reset: true });
    }

      const pendingRow = appendMessage('assistant', '正在发送智慧财信测试消息...', { pending: true });
      el('chatStatus').textContent = '正在向智慧财信机器人发送测试消息...';

        pendingRow.remove();

        el('chatStatus').textContent = '智慧财信测试失败';
