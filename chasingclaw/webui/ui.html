    async function sendChat() {
      const input = el('message');
      const rawMessage = input.value.trim();

      if (!rawMessage && !pendingFiles.length) {
        return;
      }

      const attachmentPayload = await buildAttachmentPayload(pendingFiles);
      const built = buildMessageWithAttachments(rawMessage, attachmentPayload);
      if (!built.llmMessage) {
        return;
      }

      input.value = '';
      pendingFiles = [];
      el('filePicker').value = '';
      renderPendingFiles();

      appendMessage('user', built.displayMessage || rawMessage || '(文件输入)', {
        attachments: built.attachments,
      });

      // Create streaming assistant bubble
      const streamRow = document.createElement('div');
      streamRow.className = 'chat-row assistant';
      const streamBubble = document.createElement('div');
      streamBubble.className = 'message assistant';
      const streamToolLog = document.createElement('div');
      streamToolLog.className = 'stream-tool-log';
      const streamText = document.createElement('div');
      streamText.className = 'stream-text';
      streamBubble.appendChild(streamToolLog);
      streamBubble.appendChild(streamText);
      streamRow.appendChild(streamBubble);
      chatLog.appendChild(streamRow);
      chatLog.scrollTop = chatLog.scrollHeight;
      el('chatStatus').textContent = '思考中...';

      let fullReply = '';
      let finalTrace = [];
      let pendingToolCalls = {};  // callId -> element

      function addToolStep(event) {
        const step = document.createElement('div');
        step.className = 'stream-tool-step stream-tool-step--running';
        step.dataset.callId = event.callId || '';
        const icon = document.createElement('span');
        icon.className = 'stream-tool-icon';
        icon.textContent = '⚙';
        const label = document.createElement('span');
        label.className = 'stream-tool-label';
        label.textContent = event.summary || ('调用 ' + event.tool);
        step.appendChild(icon);
        step.appendChild(label);
        if (event.arguments) {
          const args = document.createElement('div');
          args.className = 'stream-tool-args';
          args.textContent = event.arguments;
          step.appendChild(args);
        }
        streamToolLog.appendChild(step);
        chatLog.scrollTop = chatLog.scrollHeight;
        if (event.callId) pendingToolCalls[event.callId] = step;
        return step;
      }

      function finishToolStep(event) {
        const step = pendingToolCalls[event.callId];
        if (step) {
          step.classList.remove('stream-tool-step--running');
          step.classList.add(event.status === 'error' ? 'stream-tool-step--error' : 'stream-tool-step--done');
          const icon = step.querySelector('.stream-tool-icon');
          if (icon) icon.textContent = event.status === 'error' ? '✕' : '✓';
        }
      }

      try {
        const resp = await fetch('/api/chat/stream', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            message: built.llmMessage,
            displayMessage: built.displayMessage || rawMessage,
            attachments: built.attachments,
            sessionId,
          }),
        });

        const reader = resp.body.getReader();
        const decoder = new TextDecoder();
        let buf = '';

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          buf += decoder.decode(value, { stream: true });

          // Parse SSE lines
          const lines = buf.split('\n');
          buf = lines.pop(); // keep incomplete line
          for (const line of lines) {
            if (!line.startsWith('data: ')) continue;
            let event;
            try { event = JSON.parse(line.slice(6)); } catch { continue; }

            if (event.type === 'token') {
              fullReply += event.text;
              streamText.textContent = fullReply;
              chatLog.scrollTop = chatLog.scrollHeight;
              el('chatStatus').textContent = '生成中...';
            } else if (event.type === 'tool_call') {
              el('chatStatus').textContent = '调用工具: ' + event.tool;
              addToolStep(event);
            } else if (event.type === 'tool_result') {
              finishToolStep(event);
              el('chatStatus').textContent = '工具完成';
            } else if (event.type === 'done') {
              fullReply = event.reply || fullReply;
              finalTrace = event.trace || [];
            } else if (event.type === 'error') {
              fullReply = 'Error: ' + event.message;
            }
          }
        }

        // Replace streaming row with final rendered message
        streamRow.remove();
        appendMessage('assistant', fullReply || '', {
          markdown: true,
          trace: finalTrace,
        });
        el('chatStatus').textContent = '';
        await loadSessions();
      } catch (err) {
        streamRow.remove();
        appendMessage('assistant', 'Error:\n```\n' + err.message + '\n```', { markdown: true });
        el('chatStatus').textContent = '发送失败';
      }
    }


    function clearChatWindow() {
      chatLog.innerHTML = '';
      el('chatStatus').textContent = '';
      toggleChatMode(false);
    }

    function scheduleText(job) {
      if (job.scheduleKind === 'every') return 'every ' + (job.everySeconds || 0) + 's';
      if (job.scheduleKind === 'cron') return job.cronExpr || '';
      if (job.scheduleKind === 'at') return job.atIso || '';
      return '';
    }

    function formatCronTime(ts) {
      if (!ts) return '-';
      const d = new Date(ts);
      if (Number.isNaN(d.getTime())) return '-';
      return d.toLocaleString();
    }

    async function loadCronJobs() {
      const data = await api('/api/cron/jobs?all=1');
      const jobs = data.jobs || [];
      const container = el('cronList');

      let html = '<div class="cron-head"><div>ID</div><div>任务</div><div>计划</div><div>操作</div></div>';
      if (!jobs.length) {
        html += '<div class="cron-item"><div>-</div><div>暂无任务</div><div>-</div><div>-</div></div>';
      } else {
        for (const j of jobs) {
          const status = j.enabled ? '启用' : '禁用';
          const meta = status + ' / next: ' + formatCronTime(j.nextRunAtMs);
          html += '<div class="cron-item">' +
            '<div>' + escapeHtml(j.id) + '</div>' +
            '<div>' + escapeHtml(j.name) + '<div class="muted" style="font-size:11px; margin-top:4px;">' + escapeHtml(meta) + '</div></div>' +
            '<div>' + escapeHtml(scheduleText(j)) + '</div>' +
            '<div class="cron-actions">' +
            '<button data-act="toggle" data-id="' + escapeHtml(j.id) + '" data-enabled="' + (j.enabled ? '1' : '0') + '">' + (j.enabled ? '禁用' : '启用') + '</button>' +
            '<button data-act="run" data-id="' + escapeHtml(j.id) + '">执行</button>' +
            '<button data-act="remove" data-id="' + escapeHtml(j.id) + '">删除</button>' +
            '</div>' +
            '</div>';
        }
      }

      container.innerHTML = html;
    }

    async function addCronJob() {
      el('cronStatus').textContent = '保存任务中...';
      const payload = {
        name: el('cronName').value.trim() || '新任务',
        message: el('cronMessage').value.trim(),
        scheduleType: el('cronScheduleType').value,
        everySeconds: Number(el('cronEverySeconds').value || 0),
        cronExpr: el('cronExpr').value.trim(),
        atTime: el('cronAt').value,
      };

      if (!payload.message) {
        el('cronStatus').textContent = '任务消息不能为空';
        return;
      }

      try {
        await api('/api/cron/jobs', {
          method: 'POST',
          body: JSON.stringify(payload),
        });
        el('cronStatus').textContent = '任务已创建';
        await loadCronJobs();
      } catch (err) {
        el('cronStatus').textContent = '创建失败: ' + err.message;
      }
    }

    async function onCronAction(e) {
      const btn = e.target.closest('button[data-act]');
      if (!btn) return;

      const action = btn.getAttribute('data-act');
      const jobId = btn.getAttribute('data-id');
      try {
        if (action === 'toggle') {
          const enabled = btn.getAttribute('data-enabled') !== '1';
          await api('/api/cron/toggle', {
            method: 'POST',
            body: JSON.stringify({ jobId, enabled }),
          });
          el('cronStatus').textContent = enabled ? '任务已启用' : '任务已禁用';
        } else if (action === 'remove') {
          await api('/api/cron/remove', {
            method: 'POST',
            body: JSON.stringify({ jobId }),
          });
          el('cronStatus').textContent = '任务已删除';
        } else if (action === 'run') {
          await api('/api/cron/run', {
            method: 'POST',
            body: JSON.stringify({ jobId, force: true }),
          });
          el('cronStatus').textContent = '任务已执行';
        }
        await loadCronJobs();
      } catch (err) {
        el('cronStatus').textContent = '操作失败: ' + err.message;
      }
    }

    async function loadMemoryFiles() {
      const elList = el('memoryList');
      try {
        elList.innerHTML = '<div class="empty-state">加载中...</div>';
        const data = await api('/api/memory/list');
        const files = Array.isArray(data.files) ? data.files : [];
        if (files.length === 0) {
          elList.innerHTML = '<div class="empty-state">暂无记忆文件</div>';
          return;
        }
        elList.innerHTML = '';
        for (const file of files) {
          const item = document.createElement('div');
          item.className = 'cron-item';
          item.style.cursor = 'pointer';
          item.onclick = () => openFileEditor(file.path, file.name);
          item.innerHTML = '<div class="cron-details"><div class="cron-title">' + escapeHtml(file.name) + '</div><div class="cron-meta">大小: ' + formatFileSize(file.size) + ' · 更新于：' + formatDateTime(file.updated_at) + '</div></div>';
          elList.appendChild(item);
        }
      } catch (err) {
        elList.innerHTML = '<div class="empty-state">加载失败: ' + err.message + '</div>';
      }
    }

    let currentSkillDir = '';
    async function loadSkillsFiles(dir = '') {
      currentSkillDir = dir;
      const elList = el('skillsList');
      try {
        elList.innerHTML = '<div class="empty-state">加载中...</div>';
        const data = await api('/api/skills/list' + (dir ? '?dir=' + encodeURIComponent(dir) : ''));
        const skills = Array.isArray(data.skills) ? data.skills : [];
        elList.innerHTML = '';

        if (dir) {
          const upItem = document.createElement('div');
          upItem.className = 'cron-item';
          upItem.style.cursor = 'pointer';
          upItem.onclick = () => loadSkillsFiles('');
          upItem.innerHTML = '<div class="cron-details"><div class="cron-title">.. (返回上级)</div></div>';
          elList.appendChild(upItem);
        }

        if (skills.length === 0) {
          elList.innerHTML += '<div class="empty-state">暂无技能/文件</div>';
          return;
        }

        for (const skill of skills) {
          const item = document.createElement('div');
          item.className = 'cron-item';
          item.style.cursor = 'pointer';
          if (skill.is_dir) {
            item.onclick = () => loadSkillsFiles(skill.name);
            item.innerHTML = '<div class="cron-details"><div class="cron-title">📁 ' + escapeHtml(skill.name) + '</div><div class="cron-meta">目录</div></div>';
          } else {
            item.onclick = () => openFileEditor(skill.path, skill.name);
            item.innerHTML = '<div class="cron-details"><div class="cron-title">📄 ' + escapeHtml(skill.name) + '</div><div class="cron-meta">更新于：' + formatDateTime(skill.updated_at) + '</div></div>';
          }
          elList.appendChild(item);
        }
      } catch (err) {
        elList.innerHTML = '<div class="empty-state">加载失败: ' + err.message + '</div>';
      }
    }

    let currentEditFile = '';
    async function openFileEditor(path, name) {
      currentEditFile = path;
      el('fileEditorPath').textContent = path;
      el('fileEditorTitle').textContent = '编辑 ' + name;
      el('fileEditorStatus').textContent = '加载中...';
      el('fileEditorStatus').style.color = '';
      el('fileEditorContent').value = '';
      el('fileEditorModal').classList.remove('hidden');
      try {
        const res = await api('/api/files/read', {
          method: 'POST',
          body: JSON.stringify({ path }),
        });
        el('fileEditorContent').value = res.content || '';
        el('fileEditorStatus').textContent = '已加载';
      } catch (err) {
        el('fileEditorStatus').textContent = '加载失败: ' + err.message;
        el('fileEditorStatus').style.color = 'var(--err)';
      }
    }

    async function saveFileEditor() {
      const content = el('fileEditorContent').value;
      el('fileEditorStatus').textContent = '保存中...';
      el('fileEditorStatus').style.color = 'var(--text)';
      try {
        await api('/api/files/save', {
          method: 'POST',
          body: JSON.stringify({ path: currentEditFile, content }),
        });
        el('fileEditorStatus').textContent = '保存成功';
        el('fileEditorStatus').style.color = 'var(--ok)';
        setTimeout(() => {
          el('fileEditorModal').classList.add('hidden');
        }, 800);
      } catch (err) {
        el('fileEditorStatus').textContent = '保存失败: ' + err.message;
        el('fileEditorStatus').style.color = 'var(--err)';
      }
    }

    function onFilePicked(files) {
      for (const file of files) {
        if (!file) continue;
        if (pendingFiles.some((f) => f.name === file.name && f.size === file.size && f.lastModified === file.lastModified)) {
          continue;
        }
        if (pendingFiles.length >= MAX_ATTACHMENTS) {
          break;
        }
        pendingFiles.push(file);
      }
      renderPendingFiles();
    }

    el('provider').addEventListener('change', updateApiBaseState);
    el('webhookMessageType').addEventListener('change', updateWebhookMessageTypeState);
    el('cronScheduleType').addEventListener('change', updateCronScheduleInputs);

    el('sendBtn').addEventListener('click', sendChat);
    el('saveBtn').addEventListener('click', saveConfig);
    el('webhookTestBtn').addEventListener('click', testWebhook);
    el('clearChatBtn').addEventListener('click', clearChatWindow);

    el('cronAddBtn').addEventListener('click', addCronJob);
    el('cronRefreshBtn').addEventListener('click', loadCronJobs);
    el('cronList').addEventListener('click', onCronAction);

    el('newSessionBtn').addEventListener('click', async () => {
      sessionId = createSessionId();
      setSessionInfo();
      clearChatWindow();
      await loadHistory();
      await loadSessions();
      showChatView();
    });

    el('openSettingsBtn').addEventListener('click', showSettingsView);
    document.querySelectorAll('.backToChatBtn').forEach(btn => btn.addEventListener('click', showChatView));

    el('navMemoryBtn').addEventListener('click', showMemoryView);
    el('navCronBtn').addEventListener('click', showCronView);
    el('navSkillsBtn').addEventListener('click', showSkillsView);

    el('memoryRefreshBtn').addEventListener('click', loadMemoryFiles);
    el('skillsRefreshBtn').addEventListener('click', () => loadSkillsFiles(currentSkillDir));

    el('fileEditorCloseBtn').addEventListener('click', () => el('fileEditorModal').classList.add('hidden'));
    el('fileEditorCancelBtn').addEventListener('click', () => el('fileEditorModal').classList.add('hidden'));
    el('fileEditorSaveBtn').addEventListener('click', saveFileEditor);

    el('message').addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendChat();
      }
    });

    document.addEventListener('click', () => {
      document.querySelectorAll('.session-pop-menu:not(.hidden)').forEach(menu => {
        menu.classList.add('hidden');
      });
    });

    el('fileBtn').addEventListener('click', () => {
      el('filePicker').click();
    });

    el('welcomeFileBtn').addEventListener('click', () => {
      el('filePicker').click();
    });

    // Welcome screen send
    el('welcomeSendBtn').addEventListener('click', () => {
      const msg = el('welcomeMessage').value.trim();
      if (!msg) return;
      el('message').value = msg;
      el('welcomeMessage').value = '';
      sendChat();
    });

    el('welcomeMessage').addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        el('welcomeSendBtn').click();
      }
    });

    el('filePicker').addEventListener('change', (e) => {
      const files = Array.from(e.target.files || []);
      onFilePicked(files);
    });

    (async () => {
      try {
        setSessionInfo();
        await loadConfig();
        await loadSessions();
        await loadHistory();
        updateCronScheduleInputs();
        await loadCronJobs();
        startWebhookEventPolling();
        showChatView();
      } catch (err) {
        el('cfgStatus').textContent = '配置加载失败：' + (err.message || String(err));
        setProviderOptions(DEFAULT_PROVIDER_OPTIONS, 'openrouter');
        el('inboundWebhookUrl').value = window.location.origin + '/api/webhook/request';
        try {
          await loadWebhookEvents({ reset: true });
        } catch (_) {
          // ignore fallback webhook errors
        }
        startWebhookEventPolling();
      }
    })();
  </script>
